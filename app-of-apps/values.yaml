global:
  kafka:
    name: &kafka kafka
    namespace: &kafkanamespace kafka
    kafka-cluster: &kafkacluster
      bootstrapServer: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
      securityProtocol: SASL_PLAINTEXT
      saslMechanism: SCRAM-SHA-512
      clientId: globex
      clientSecret: globex

amqstreams:
  enabled: true
  applicationName: amqstreams
  applicationNamespace: openshift-gitops
  destinationNamespace: kafka
  source:
    repoUrl: https://github.com/btison/mcp-workshop-install-helm.git
    targetRevision: main
    path: amq-streams
    helm:
      values:
        kafka:
          enabled: true
        console:
          enabled: true

        kafka-broker:
          namespace: *kafkanamespace
          nameOverride: *kafka
          kafka:
            controller:
              enabled: true
            listener:
              external:
                tls:
                  secret:
                    value:
                      crt: 
                      key: 
          authentication:
            clientId: admin
            clientSecret: adminpassword
            securityProtocol: SASL_PLAINTEXT
            saslMechanism: SCRAM-SHA-512
        amq-streams-console:
          namespace: *kafkanamespace
          subdomain: 
          kafka:
            name: *kafka
            namespace: *kafkanamespace
            authentication:
              securityProtocol: SASL_SSL
              saslMechanism: SCRAM-SHA-512
            authorization: simple
        kafka-topics:
          kafka:
            namespace: *kafkanamespace
            cluster: *kafka
  argocd:
    enabled: true
    syncwave: "1"

keycloak:
  enabled: true
  applicationName: keycloak
  applicationNamespace: openshift-gitops
  destinationNamespace: keycloak
  source:
    repoUrl: https://github.com/btison/mcp-workshop-install-helm.git
    targetRevision: main
    path: keycloak
    helm:
      values:
        keycloak:
          nameOverride: keycloak
          route:
            host:
          ingress:
            enabled: false
  argocd:
    enabled: true
    syncwave: "1"

globex:
  enabled: true
  applicationName: globex
  applicationNamespace: openshift-gitops
  destinationNamespace: globex
  source:
    repoUrl: https://github.com/btison/mcp-workshop-install-helm.git
    targetRevision: main
    path: globex
    helm:
      values:
        kafka-broker:
          namespace: *kafkanamespace
          nameOverride: *kafka

        kafka-topics:
          kafka:
            namespace: *kafkanamespace
            cluster: *kafka
        globex-db:
          pgsql:
            adminPassword: adminpassword

        keycloak-realmimport-globex:
          namespace: keycloak
          keycloak:
            name: keycloak
          realm:
            name: globex
          client:
            gateway:
              name: globex-web-gateway

        globex-web:
          sso:
            authServer:
            realm: globex
            client: globex-web-gateway
          subdomain:

        activity-tracking:
          kafka:
            <<: *kafkacluster

        recommendation-engine:
          kafka:
            <<: *kafkacluster

  argocd:
    enabled: true
    syncwave: "3"

noobaa:
  enabled: true
  applicationName: noobaa
  applicationNamespace: openshift-gitops
  destinationNamespace: openshift-storage
  source:
    repoUrl: https://github.com/btison/mcp-workshop-install-helm.git
    targetRevision: main
    path: noobaa
    helm:
      values:
        noobaa:
          nameOverride: noobaa

  argocd:
    enabled: true
    syncwave: "1"

vault:
  enabled: false
  applicationName: vault
  applicationNamespace: openshift-gitops
  destinationNamespace: vault
  source:
    repoUrl: https://github.com/btison/mcp-workshop-install-helm.git
    targetRevision: main
    path: vault
    helm:
      values:
        nameOverride: vault
        kubernetes:
          apiserver:
        vault:
          auth:
            namespace: default

  argocd:
    enabled: true
    syncwave: "1"

quay:
  enabled: true
  applicationName: quay
  applicationNamespace: openshift-gitops
  destinationNamespace: quay
  source:
    repoUrl: https://github.com/btison/mcp-workshop-install-helm.git
    targetRevision: main
    path: quay
    helm:
      values:
        quay-registry:
          quay:
            host: 
            adminUser: admin
            adminUserPassword: 
            organizations:
          noobaa:
            name: noobaa
            namespace: openshift-storage

  argocd:
    enabled: true
    syncwave: "2"

gitlab:
  enabled: true
  applicationName: gitlab
  applicationNamespace: openshift-gitops
  destinationNamespace: gitlab
  source:
    repoUrl: https://github.com/btison/mcp-workshop-install-helm.git
    targetRevision: main
    path: gitlab
    helm:
      values:
        gitlab:
          rootPassword:
          users:
            password:
          host:
          smtp:
            host:
          ssh:
            host:
  argocd:
    enabled: true
    syncwave: "3"


ocp4_workload_platform_engineering_workshop_gitlab_namespace: gitlab

ocp4_workload_platform_engineering_workshop_gitlab_gitops_repo: https://github.com/btison/agnosticg.git
ocp4_workload_platform_engineering_workshop_gitlab_gitops_repo_path: charts/gitlab
ocp4_workload_platform_engineering_workshop_gitlab_gitops_repo_tag: configured
ocp4_workload_platform_engineering_workshop_gitlab_gitops_name: gitlab
ocp4_workload_platform_engineering_workshop_gitlab_gitops_namespace: openshift-gitops

ocp4_workload_platform_engineering_workshop_gitlab_config_smtp_host:
  smtp.gitlab-{{ ocp4_workload_platform_engineering_workshop_gitlab_namespace }}.{{ r_openshift_subdomain }}
ocp4_workload_platform_engineering_workshop_gitlab_config_ssh_host:
  ssh.gitlab-{{ ocp4_workload_platform_engineering_workshop_gitlab_namespace }}.{{ r_openshift_subdomain }}
ocp4_workload_platform_engineering_workshop_gitlab_config_root_password: "{{ common_password }}"
ocp4_workload_platform_engineering_workshop_gitlab_config_host:
  "gitlab-{{ ocp4_workload_platform_engineering_workshop_gitlab_namespace }}.{{ r_openshift_subdomain }}"

ocp4_workload_platform_engineering_workshop_gitlab_users_password: "{{ common_password }}"